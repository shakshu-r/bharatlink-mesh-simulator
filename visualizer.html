<!DOCTYPE html>
<html>
<head>
    <title>BharatLink Smart Simulator</title>
</head>

<body style="background:#050505; color:white; font-family:Arial; text-align:center;">

<h1>🚀 BharatLink Mesh Network</h1>

<div style="margin:15px; padding:10px; background:#111; border-radius:10px; display:inline-block;">

    <label>From:</label>
    <select id="from"></select>

    <label>To:</label>
    <select id="to"></select>

    <br><br>

    <button onclick="sendPacket(false)" style="padding:8px 12px; margin:5px; background:#00aa66; color:white; border:none; border-radius:5px;">
        Send Message
    </button>

    <button onclick="sendPacket(true)" style="padding:8px 12px; margin:5px; background:red; color:white; border:none; border-radius:5px;">
        🚨 SOS
    </button>

    <button onclick="togglePause()" style="padding:8px 12px; margin:5px; background:#555; color:white; border:none; border-radius:5px;">
        ⏯ Pause/Resume
    </button>

    <br><br>

    <label>Speed:</label>
    <input type="range" min="1" max="5" value="2" id="speed">

</div>

<canvas id="network" width="800" height="500"></canvas>

<p id="stats"></p>

<script>
const canvas = document.getElementById("network");
const ctx = canvas.getContext("2d");

let paused = false;

// Nodes
const nodes = {
    A:{x:100,y:250},
    B:{x:250,y:100},
    C:{x:400,y:250},
    D:{x:550,y:100},
    E:{x:700,y:300}
};

// Dropdowns
const fromSelect = document.getElementById("from");
const toSelect = document.getElementById("to");

Object.keys(nodes).forEach(n=>{
    fromSelect.innerHTML += `<option>${n}</option>`;
    toSelect.innerHTML += `<option>${n}</option>`;
});

// Links
const links = [
    ["A","B"],["A","C"],
    ["B","C"],["B","D"],
    ["C","D"],["C","E"],
    ["D","E"]
];

// Draw links
function drawLinks(){
    ctx.strokeStyle="#444";
    links.forEach(([a,b])=>{
        ctx.beginPath();
        ctx.moveTo(nodes[a].x,nodes[a].y);
        ctx.lineTo(nodes[b].x,nodes[b].y);
        ctx.stroke();
    });
}

// Draw nodes
function drawNodes(){
    for(let n in nodes){
        ctx.fillStyle="#fff";
        ctx.beginPath();
        ctx.arc(nodes[n].x,nodes[n].y,20,0,Math.PI*2);
        ctx.fill();

        ctx.fillStyle="#000";
        ctx.fillText(n,nodes[n].x-5,nodes[n].y+5);
    }
}

// Get neighbors
function getNeighbors(node){
    return links
        .filter(l=>l.includes(node))
        .map(l=>l[0]===node?l[1]:l[0]);
}

// 🔥 SHORTEST PATH (BFS)
function findPath(start, target){
    let queue = [[start]];
    let visited = new Set();

    while(queue.length > 0){
        let path = queue.shift();
        let node = path[path.length - 1];

        if(node === target) return path;

        if(!visited.has(node)){
            visited.add(node);

            let neighbors = getNeighbors(node);
            neighbors.forEach(n=>{
                queue.push([...path, n]);
            });
        }
    }
    return null;
}

// Packets
let packets = [];
let totalPackets = 0;

// Send packet
function sendPacket(priority=false){
    let start = fromSelect.value;
    let end = toSelect.value;

    if(start === end) return;

    let path = findPath(start, end);

    if(!path) return;

    packets.push({
        path: path,
        step: 0,
        progress: 0,
        priority: priority
    });

    totalPackets++;
}

// Pause
function togglePause(){
    paused = !paused;
}

// Animate
function animate(){

    if(paused){
        requestAnimationFrame(animate);
        return;
    }

    let speed = document.getElementById("speed").value;

    ctx.clearRect(0,0,800,500);

    drawLinks();
    drawNodes();

    packets.forEach((p,index)=>{

        if(p.step >= p.path.length - 1){
            packets.splice(index,1);
            return;
        }

        let start = nodes[p.path[p.step]];
        let end = nodes[p.path[p.step+1]];

        let x = start.x + (end.x-start.x)*p.progress;
        let y = start.y + (end.y-start.y)*p.progress;

        ctx.fillStyle = p.priority ? "red" : "#00ff88";
        ctx.beginPath();
        ctx.arc(x,y,8,0,Math.PI*2);
        ctx.fill();

        p.progress += 0.01 * speed;

        if(p.progress >= 1){
            p.progress = 0;
            p.step++;
        }

    });

    document.getElementById("stats").innerHTML =
        "📦 Active: "+packets.length+
        " | 🚀 Total Sent: "+totalPackets;

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
