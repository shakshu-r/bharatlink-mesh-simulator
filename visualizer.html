<!DOCTYPE html>
<html>
<head>
    <title>BharatLink Control Simulator</title>
</head>

<body style="background:#050505; color:white; font-family:Arial; text-align:center;">

<h1>🚀 BharatLink Mesh Network</h1>

<div style="margin:10px;">

    From:
    <select id="from"></select>

    To:
    <select id="to"></select>

    <button onclick="sendPacket(false)">Send Message</button>
    <button onclick="sendPacket(true)">🚨 SOS</button>

    <button onclick="togglePause()">⏯ Pause/Resume</button>

    Speed:
    <input type="range" min="1" max="5" value="2" id="speed">

</div>

<canvas id="network" width="800" height="500"></canvas>

<p id="stats"></p>

<script>
const canvas = document.getElementById("network");
const ctx = canvas.getContext("2d");

let paused = false;
let speed = 2;

// Nodes
const nodes = {
    A:{x:100,y:250},
    B:{x:250,y:100},
    C:{x:400,y:250},
    D:{x:550,y:100},
    E:{x:700,y:300}
};

// Populate dropdowns
const fromSelect = document.getElementById("from");
const toSelect = document.getElementById("to");

Object.keys(nodes).forEach(n=>{
    fromSelect.innerHTML += `<option>${n}</option>`;
    toSelect.innerHTML += `<option>${n}</option>`;
});

// Mesh links
const links = [
    ["A","B"],["A","C"],
    ["B","C"],["B","D"],
    ["C","D"],["C","E"],
    ["D","E"]
];

function drawLinks(){
    ctx.strokeStyle="#444";
    links.forEach(([a,b])=>{
        ctx.beginPath();
        ctx.moveTo(nodes[a].x,nodes[a].y);
        ctx.lineTo(nodes[b].x,nodes[b].y);
        ctx.stroke();
    });
}

function drawNodes(){
    for(let n in nodes){
        ctx.fillStyle="#fff";
        ctx.beginPath();
        ctx.arc(nodes[n].x,nodes[n].y,20,0,Math.PI*2);
        ctx.fill();

        ctx.fillStyle="#000";
        ctx.fillText(n,nodes[n].x-5,nodes[n].y+5);
    }
}

function getNeighbors(node){
    return links
        .filter(l=>l.includes(node))
        .map(l=>l[0]===node?l[1]:l[0]);
}

// Packet system
let packets = [];
let totalPackets = 0;

function sendPacket(priority=false){
    let start = fromSelect.value;
    let end = toSelect.value;

    if(start === end) return;

    packets.push({
        path:[start],
        target:end,
        progress:0,
        priority:priority,
        hops:0
    });

    totalPackets++;
}

function togglePause(){
    paused = !paused;
}

// Animation
function animate(){

    if(paused){
        requestAnimationFrame(animate);
        return;
    }

    speed = document.getElementById("speed").value;

    ctx.clearRect(0,0,800,500);

    drawLinks();
    drawNodes();

    packets.forEach((p,index)=>{

        let current = p.path[p.path.length-1];

        if(current === p.target){
            packets.splice(index,1);
            return;
        }

        let neighbors = getNeighbors(current);
        let next = neighbors[Math.floor(Math.random()*neighbors.length)];

        let start = nodes[current];
        let end = nodes[next];

        let x = start.x + (end.x-start.x)*p.progress;
        let y = start.y + (end.y-start.y)*p.progress;

        ctx.fillStyle = p.priority ? "red" : "#00ff88";
        ctx.beginPath();
        ctx.arc(x,y,8,0,Math.PI*2);
        ctx.fill();

        p.progress += 0.01 * speed;

        if(p.progress >= 1){
            p.progress = 0;
            p.path.push(next);
            p.hops++;
        }

    });

    document.getElementById("stats").innerHTML =
        "📦 Active: "+packets.length+
        " | 🚀 Total Sent: "+totalPackets;

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
